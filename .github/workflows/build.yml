name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Show compiler version
        run: g++ --version

      - name: Compile (strict warnings)
        run: g++ -std=c++11 -Wall -Wextra -Wpedantic -O2 -o hotel src/main.cpp

      - name: Smoke test (start + exit)
        run: echo "0" | ./hotel
